<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thomas's Math Adventure</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap');
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --pop1: #ff6b6b;
  --pop2: #ffd93d;
  --pop3: #6bcb77;
  --pop4: #4d96ff;
  --pop5: #ff922b;
}
body {
  font-family: 'Nunito', 'Fredoka One', sans-serif;
  background: var(--bg);
  color: #fff;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.screen { display: none; flex-direction: column; align-items: center; text-align: center; width: 100%; max-width: 500px; padding: 20px; }
.screen.active { display: flex; }
h1 { font-family: 'Fredoka One', cursive; font-size: 2.4rem; margin-bottom: 8px; }
.subtitle { font-size: 1.1rem; color: #aaa; margin-bottom: 24px; }

/* Start Screen */
.logo-emoji { font-size: 5rem; animation: bounce 1.5s infinite; }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
.start-btn {
  font-family: 'Fredoka One', cursive; font-size: 1.6rem;
  background: linear-gradient(135deg, var(--pop5), var(--pop1));
  color: #fff; border: none; border-radius: 60px;
  padding: 18px 48px; margin-top: 20px; cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,107,107,.4);
  transition: transform .15s;
}
.start-btn:active { transform: scale(.95); }

/* Number Picker */
.number-picker { margin: 20px 0; width: 100%; }
.number-picker h2 { font-family: 'Fredoka One', cursive; font-size: 1.3rem; margin-bottom: 12px; color: var(--pop2); }
.number-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 360px; margin: 0 auto; }
.num-btn {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.3rem;
  border: 3px solid #333; border-radius: 14px; padding: 14px 8px;
  cursor: pointer; color: #888; background: var(--card);
  transition: all .15s;
}
.num-btn.selected {
  border-color: var(--pop3); color: #fff; background: rgba(107,203,119,.2);
  box-shadow: 0 0 12px rgba(107,203,119,.3);
}
.num-btn:active { transform: scale(.93); }
.quick-picks { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
.quick-pick-btn {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .85rem;
  background: var(--card); border: 2px solid #444; border-radius: 20px;
  padding: 8px 16px; cursor: pointer; color: #aaa;
  transition: all .15s;
}
.quick-pick-btn:hover, .quick-pick-btn:active { border-color: var(--pop4); color: #fff; }

/* HUD */
.hud {
  display: flex; justify-content: space-between; width: 100%;
  margin-bottom: 12px; font-size: .95rem;
}
.hud span { background: var(--card); padding: 6px 14px; border-radius: 20px; }

/* Practicing label */
.practicing-label { font-size: .85rem; color: #777; margin-bottom: 6px; }

/* Problem */
.problem {
  font-family: 'Fredoka One', cursive; font-size: 3.2rem;
  background: var(--card); border-radius: 20px;
  padding: 24px 36px; margin-bottom: 24px;
  box-shadow: 0 4px 15px rgba(0,0,0,.3);
  min-width: 260px;
}

/* Choices */
.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; }
.choice-btn {
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.5rem;
  border: none; border-radius: 16px; padding: 20px 10px;
  cursor: pointer; color: #fff;
  transition: transform .12s, box-shadow .12s;
  box-shadow: 0 4px 10px rgba(0,0,0,.25);
}
.choice-btn:active { transform: scale(.93); }
.choice-btn:nth-child(1) { background: var(--pop1); }
.choice-btn:nth-child(2) { background: var(--pop4); }
.choice-btn:nth-child(3) { background: var(--pop3); }
.choice-btn:nth-child(4) { background: var(--pop5); }

.choice-btn.correct { animation: popCorrect .5s; }
@keyframes popCorrect { 0% { transform: scale(1); } 40% { transform: scale(1.15); } 100% { transform: scale(1); } }
.choice-btn.wrong { animation: shake .4s; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

/* Feedback */
.feedback {
  font-size: 1.3rem; min-height: 2em; margin-top: 14px;
  font-weight: 800; transition: opacity .3s;
}

/* Confetti canvas */
#confetti {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 999;
}

/* End screen */
.final-score { font-size: 3rem; font-family: 'Fredoka One', cursive; color: var(--pop2); }
.stars { font-size: 3rem; margin: 10px 0; }
.end-details { font-size: 1rem; color: #aaa; margin: 8px 0; }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<!-- START SCREEN -->
<div id="start-screen" class="screen active">
  <div class="logo-emoji">🚀</div>
  <h1>Thomas's Math Adventure</h1>
  <p class="subtitle">Multiply your way to the stars! ⭐</p>

  <div class="number-picker">
    <h2>Pick your numbers:</h2>
    <div class="number-grid" id="number-grid"></div>

  </div>

  <button class="start-btn" onclick="startGame()">Let's Go! 🎮</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div class="hud">
    <span>⭐ Score: <b id="score">0</b></span>
    <span>🔥 Streak: <b id="streak">0</b></span>
    <span>📝 <b id="progress">0</b>/20</span>
  </div>
  <div class="practicing-label" id="practicing-label"></div>
  <div class="problem" id="problem">? × ?</div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback">&nbsp;</div>
</div>

<!-- END SCREEN -->
<div id="end-screen" class="screen">
  <div class="logo-emoji">🏆</div>
  <h1>Amazing Job!</h1>
  <div class="stars" id="end-stars"></div>
  <div class="final-score">Score: <span id="final-score">0</span></div>
  <div class="end-details" id="end-details"></div>
  <p class="subtitle" id="end-msg"></p>
  <button class="start-btn" onclick="backToStart()">Play Again! 🔄</button>
</div>

<script>
// ---- STATE ----
let score=0, streak=0, bestStreak=0, questionsAnswered=0, totalCorrect=0;
let currentAnswer = 0;
let locked = false;
let selectedNumbers = new Set([1,2,3,4]);
const TOTAL_QUESTIONS = 20;

// ---- NUMBER PICKER ----
function buildNumberGrid() {
  const grid = document.getElementById('number-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 12; i++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn' + (selectedNumbers.has(i) ? ' selected' : '');
    btn.textContent = i;
    btn.onclick = () => toggleNumber(i, btn);
    grid.appendChild(btn);
  }
}

function toggleNumber(n, btn) {
  if (selectedNumbers.has(n)) {
    if (selectedNumbers.size <= 1) return; // need at least 1
    selectedNumbers.delete(n);
    btn.classList.remove('selected');
  } else {
    selectedNumbers.add(n);
    btn.classList.add('selected');
  }
}

function quickPick(nums) {
  selectedNumbers = new Set(nums);
  buildNumberGrid();
}

buildNumberGrid();

// ---- SCREENS ----
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function backToStart() {
  buildNumberGrid();
  show('start-screen');
}

// ---- GAME ----
function startGame() {
  if (selectedNumbers.size === 0) return;
  score=0; streak=0; bestStreak=0; questionsAnswered=0; totalCorrect=0;
  updateHUD();
  const nums = [...selectedNumbers].sort((a,b)=>a-b);
  document.getElementById('practicing-label').textContent = `Practicing: ${nums.join(', ')}`;
  show('game-screen');
  nextQuestion();
}

function nextQuestion() {
  if (questionsAnswered >= TOTAL_QUESTIONS) return endGame();
  locked = false;
  document.getElementById('feedback').innerHTML = '&nbsp;';
  const tables = [...selectedNumbers];
  const a = tables[Math.floor(Math.random()*tables.length)];
  const b = Math.floor(Math.random()*12)+1;
  currentAnswer = a * b;
  document.getElementById('problem').textContent = `${a} × ${b}`;

  // Generate 4 unique choices including the answer
  const choices = new Set([currentAnswer]);
  while (choices.size < 4) {
    const off = Math.floor(Math.random()*20) - 10;
    const fake = currentAnswer + (off === 0 ? (Math.random()>.5?1:-1)*(Math.floor(Math.random()*5)+1) : off);
    if (fake > 0 && fake !== currentAnswer) choices.add(fake);
  }
  const arr = [...choices].sort(() => Math.random()-.5);
  const container = document.getElementById('choices');
  container.innerHTML = '';
  arr.forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = val;
    btn.onclick = () => checkAnswer(val, btn);
    container.appendChild(btn);
  });
}

const CORRECT_MSGS = ["Amazing! 🎉","You got it! 🌟","Awesome! 💥","Super! 🚀","Wow! ✨","Brilliant! 🧠","Yes! 🎯","Fantastic! 🏆","Nailed it! 🔥","Perfect! 💯"];
const WRONG_MSGS = ["Almost! Try the next one! 💪","So close! Keep going! 🌈","Not quite, but you're learning! 📚","Oops! You'll get the next one! 😊","Good try! Keep it up! ⭐"];

function checkAnswer(val, btn) {
  if (locked) return;
  locked = true;
  questionsAnswered++;
  if (val === currentAnswer) {
    totalCorrect++;
    score += 10 + streak * 2;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    btn.classList.add('correct');
    document.getElementById('feedback').textContent = CORRECT_MSGS[Math.floor(Math.random()*CORRECT_MSGS.length)];
    fireConfetti();
  } else {
    streak = 0;
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (parseInt(b.textContent) === currentAnswer) b.classList.add('correct');
    });
    document.getElementById('feedback').textContent = WRONG_MSGS[Math.floor(Math.random()*WRONG_MSGS.length)];
  }
  updateHUD();
  setTimeout(nextQuestion, 1200);
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;
  document.getElementById('progress').textContent = questionsAnswered;
}

function endGame() {
  show('end-screen');
  document.getElementById('final-score').textContent = score;
  const pct = Math.round((totalCorrect/TOTAL_QUESTIONS)*100);
  const stars = pct >= 90 ? '⭐⭐⭐' : pct >= 70 ? '⭐⭐' : '⭐';
  document.getElementById('end-stars').textContent = stars;
  document.getElementById('end-details').textContent = `${totalCorrect}/${TOTAL_QUESTIONS} correct (${pct}%) · Best streak: ${bestStreak}`;
  const msgs = pct >= 90 ? "You're a multiplication superstar!" : pct >= 70 ? "Great job! Keep practicing!" : "Nice effort! Try again to beat your score!";
  document.getElementById('end-msg').textContent = msgs;
  fireConfetti(); setTimeout(fireConfetti, 600); setTimeout(fireConfetti, 1200);
}

// ---- CONFETTI ----
const C = document.getElementById('confetti');
const ctx = C.getContext('2d');
let particles = [];
function resizeCanvas() { C.width = window.innerWidth; C.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();

function fireConfetti() {
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#e84393','#00cec9'];
  for (let i=0; i<40; i++) {
    particles.push({
      x: C.width/2 + (Math.random()-.5)*200,
      y: C.height/2,
      vx: (Math.random()-.5)*12,
      vy: Math.random()*-14 - 4,
      size: Math.random()*8+4,
      color: colors[Math.floor(Math.random()*colors.length)],
      life: 1,
      rot: Math.random()*6.28,
      rv: (Math.random()-.5)*.3
    });
  }
  if (!animating) { animating=true; animateConfetti(); }
}
let animating = false;
function animateConfetti() {
  ctx.clearRect(0,0,C.width,C.height);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += .35;
    p.life -= .015; p.rot += p.rv;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0,p.life);
    ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
    ctx.restore();
  });
  particles = particles.filter(p => p.life > 0);
  if (particles.length) requestAnimationFrame(animateConfetti);
  else { animating=false; ctx.clearRect(0,0,C.width,C.height); }
}
</script>
</body>
</html>
